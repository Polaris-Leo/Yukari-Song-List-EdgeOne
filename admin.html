<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <link rel="icon" href="https://cdn.imgos.cn/vip/2026/03/23/69c11aa551328.png">
    <title>优花璃点歌台 - 管理后台</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdn.imgos.cn" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdn.imgos.cn">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" as="script" crossorigin>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" as="script" crossorigin>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.5/babel.min.js" as="script">
    <link rel="preload" href="https://cdn.imgos.cn/vip/2026/03/23/69c0e63270098.png" as="image">
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('in-browser Babel transformer')) return;
            originalWarn.apply(console, args);
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f8fafc url('https://cdn.imgos.cn/vip/2026/03/23/69c0e63270098.png') no-repeat center center fixed;
            background-size: cover;
            color: #1e293b;
            line-height: 1.5;
            min-height: 100vh;
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.25rem 1.5rem 6rem;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }
        .header h1 {
            font-size: 1.375rem;
            color: rgba(255,255,255,0.95);
            text-shadow: 0 2px 10px rgba(0,0,0,0.35);
        }

        /* ── Card ── */
        .card {
            background: rgba(255,255,255,0.85);
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.6);
            backdrop-filter: blur(14px);
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* ── Toolbar ── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        .toolbar-left  { display: flex; align-items: center; gap: 0.625rem; flex: 1; min-width: 0; flex-wrap: wrap; }
        .toolbar-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

        .search-input {
            flex: 1;
            min-width: 160px;
            max-width: 280px;
            padding: 0.45rem 0.75rem;
            background: rgba(255,255,255,0.95);
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            color: #1e293b;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-input:focus { border-color: #4f46e5; }

        .total-label { font-size: 0.8rem; color: #64748b; white-space: nowrap; }

        /* Language pill filters */
        .lang-filters { display: flex; gap: 0.375rem; flex-wrap: wrap; }
        .lang-pill {
            padding: 0.3rem 0.7rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #cbd5e1;
            background: white;
            color: #64748b;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .lang-pill:hover { border-color: #4f46e5; color: #4f46e5; }
        .lang-pill.active { background: #4f46e5; border-color: #4f46e5; color: white; }

        /* ── Table ── */
        .table-cols { grid-template-columns: 36px minmax(0,2fr) minmax(0,1.5fr) 68px 68px 104px; }

        .table-header {
            display: grid;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1.25rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.7rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .song-list { display: flex; flex-direction: column; }

        .song-row {
            display: grid;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1.25rem;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.12s;
            min-height: 48px;
        }
        .song-row:last-child { border-bottom: none; }
        .song-row:hover { background: rgba(79,70,229,0.04); }
        .song-row.selected { background: rgba(79,70,229,0.07); }

        .song-row input[type="checkbox"],
        .table-header input[type="checkbox"] {
            width: 15px; height: 15px;
            cursor: pointer;
            accent-color: #4f46e5;
            flex-shrink: 0;
        }

        .song-title  { font-size: 0.875rem; font-weight: 500; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 0.8rem; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── Badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.2rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.7rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .lang-中文 { background: #dbeafe; color: #1d4ed8; }
        .lang-日语 { background: #fce7f3; color: #9d174d; }
        .lang-英语 { background: #dcfce7; color: #15803d; }
        .lang-其他 { background: #f3f4f6; color: #475569; }
        .status-normal   { background: #dcfce7; color: #15803d; }
        .status-need_sc  { background: #fef3c7; color: #92400e; }
        .status-banned   { background: #fee2e2; color: #991b1b; }

        /* ── Row actions ── */
        .row-actions { display: flex; gap: 0.375rem; }

        /* ── Buttons ── */
        .btn {
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.15s;
            border-radius: 0.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .btn-md { padding: 0.6rem 1.25rem; font-size: 0.875rem; }
        .btn-sm { padding: 0.425rem 0.875rem; font-size: 0.8rem; }
        .btn-xs { padding: 0.28rem 0.6rem; font-size: 0.75rem; border-radius: 0.375rem; }

        .btn-primary   { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-ghost     { background: white; color: #374151; border: 1px solid #d1d5db; }
        .btn-ghost:hover { background: #f9fafb; }
        .btn-danger    { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-edit      { background: #0ea5e9; color: white; }
        .btn-edit:hover { background: #0284c7; }
        .btn-ghost-danger { background: transparent; color: #ef4444; border: 1px solid #fca5a5; }
        .btn-ghost-danger:hover { background: #fee2e2; }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.875rem 1.25rem;
            border-top: 1px solid #e2e8f0;
        }
        .page-info { font-size: 0.8rem; color: #64748b; min-width: 80px; text-align: center; }

        /* ── Batch bar (floating) ── */
        .batch-bar {
            position: fixed;
            bottom: 1.75rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 0.7rem 1rem 0.7rem 1.25rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 0.625rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.28);
            z-index: 200;
            animation: batchIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
            font-size: 0.85rem;
        }
        @keyframes batchIn {
            from { opacity: 0; transform: translateX(-50%) translateY(16px) scale(0.95); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0)     scale(1); }
        }
        .batch-count { font-weight: 700; margin-right: 0.25rem; }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 1.25rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: #1e293b;
            color: white;
            padding: 0.55rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            animation: toastIn 0.25s;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -6px); }
            to   { opacity: 1; transform: translate(-50%, 0); }
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.48);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white;
            padding: 1.75rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            animation: modalIn 0.22s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 1.25rem; color: #1e293b; }

        .form-group { margin-bottom: 0.875rem; }
        .form-label { display: block; margin-bottom: 0.35rem; font-size: 0.78rem; color: #64748b; font-weight: 600; }
        .form-input {
            width: 100%;
            padding: 0.55rem 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            color: #1e293b;
            background: white;
            outline: none;
            transition: border-color 0.15s;
        }
        .form-input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }

        /* ── Custom Select ── */
        .custom-select-wrap { position: relative; }
        .custom-select-trigger {
            width: 100%;
            padding: 0.55rem 0.75rem;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            color: #1e293b;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            transition: border-color 0.15s;
            user-select: none;
        }
        .custom-select-trigger:hover, .custom-select-trigger.open { border-color: #4f46e5; }
        .custom-select-trigger.open { box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .select-arrow { font-size: 0.65rem; color: #94a3b8; transition: transform 0.2s; }
        .select-arrow.open { transform: rotate(180deg); }
        .custom-select-options {
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            z-index: 50;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            animation: selectOpen 0.15s ease-out;
        }
        @keyframes selectOpen {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .select-option {
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            font-size: 0.875rem;
            color: #374151;
            transition: background 0.1s;
        }
        .select-option:hover { background: #f8fafc; }
        .select-option.selected { background: #eef2ff; color: #4f46e5; font-weight: 600; }

        /* ── CSV hidden input wrapper ── */
        .file-btn-wrap { position: relative; display: inline-flex; }
        .file-btn-wrap input[type="file"] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
        }

        /* ── Mobile ── */
        @media (max-width: 640px) {
            .page { padding: 0.75rem 0.75rem 6rem; }
            .header h1 { font-size: 1.1rem; }
            .table-header { display: none; }
            .table-cols { grid-template-columns: 28px 1fr; grid-template-rows: auto auto; }
            .song-row {
                grid-template-columns: 28px 1fr;
                grid-template-rows: auto auto;
                gap: 0.25rem;
                padding: 0.625rem 0.875rem;
                min-height: unset;
            }
            .song-row input[type="checkbox"] { grid-row: 1 / 3; align-self: center; }
            .song-title  { font-size: 0.85rem; }
            .song-artist { font-size: 0.775rem; }
            .song-mobile-meta { display: flex; gap: 0.375rem; align-items: center; flex-wrap: wrap; }
            .song-desktop-badge { display: none; }
            .row-actions { gap: 0.25rem; }
            .search-input { max-width: 100%; }
            .lang-filters { display: none; }
            .toolbar { gap: 0.5rem; }
        }
        @media (min-width: 641px) {
            .song-mobile-meta { display: none; }
        }

        @media (hover: none) {
            .song-row:hover { background: transparent; }
            .btn-primary:hover { background: #4f46e5; }
            .btn-danger:hover  { background: #ef4444; }
            .btn-edit:hover    { background: #0ea5e9; }
        }
    </style>
</head>
<body>
    <div id="root"><div style="display:flex;justify-content:center;align-items:center;min-height:100vh;color:rgba(255,255,255,0.7);font-size:0.9rem;">验证身份中...</div></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* ── CustomSelect ── */
        const CustomSelect = ({ value, onChange, options }) => {
            const [open, setOpen] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const fn = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
                document.addEventListener('mousedown', fn);
                return () => document.removeEventListener('mousedown', fn);
            }, []);
            const label = (options.find(o => o.value === value) || {}).label || '';
            return (
                <div className="custom-select-wrap" ref={ref}>
                    <div className={`custom-select-trigger ${open ? 'open' : ''}`} onClick={() => setOpen(!open)}>
                        <span>{label}</span>
                        <span className={`select-arrow ${open ? 'open' : ''}`}>▼</span>
                    </div>
                    {open && (
                        <div className="custom-select-options">
                            {options.map(o => (
                                <div key={o.value} className={`select-option ${value === o.value ? 'selected' : ''}`}
                                    onClick={() => { onChange(o.value); setOpen(false); }}>
                                    {o.label}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const LANG_OPTIONS = [
            { value: 'ALL', label: '全部' },
            { value: '中文', label: '中文' },
            { value: '日语', label: '日语' },
            { value: '英语', label: '英语' },
            { value: '其他', label: '其他' },
        ];
        const STATUS_LABEL = { normal: '可点', need_sc: '需SC', banned: '禁点' };
        const SONG_STATUS_OPTIONS = [
            { value: 'normal',   label: '可点歌' },
            { value: 'need_sc',  label: '需SC' },
            { value: 'banned',   label: '禁止点歌' },
        ];
        const SONG_LANG_OPTIONS = [
            { value: '中文', label: '中文' },
            { value: '日语', label: '日语' },
            { value: '英语', label: '英语' },
            { value: '其他', label: '其他' },
        ];

        /* ── Main App ── */
        function AdminApp() {
            const [songs,       setSongs]       = useState([]);
            const [totalSongs,  setTotalSongs]  = useState(0);
            const [totalPages,  setTotalPages]  = useState(1);
            const [currentPage, setCurrentPage] = useState(1);
            const [searchTerm,  setSearchTerm]  = useState('');
            const [activeLang,  setActiveLang]  = useState('ALL');

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId,   setEditingId]   = useState(null);
            const [formData,    setFormData]     = useState({ title: '', artist: '', language: '中文', status: 'normal' });
            const [submitting,  setSubmitting]   = useState(false);

            const [selectedIds, setSelectedIds] = useState(new Set());
            const headerCheckRef = useRef(null);

            const [toast, setToast] = useState(null);
            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            /* search debounce */
            const searchMounted = useRef(false);
            useEffect(() => {
                if (!searchMounted.current) { searchMounted.current = true; return; }
                const t = setTimeout(() => { setCurrentPage(1); fetchSongs(1); }, 380);
                return () => clearTimeout(t);
            }, [searchTerm]);

            useEffect(() => { fetchSongs(currentPage); }, [currentPage, activeLang]);

            /* clear selection when page/filter changes */
            useEffect(() => { setSelectedIds(new Set()); }, [currentPage, activeLang]);

            /* indeterminate state for header checkbox */
            useEffect(() => {
                if (!headerCheckRef.current) return;
                const some = songs.some(s => selectedIds.has(s.id));
                const all  = songs.length > 0 && songs.every(s => selectedIds.has(s.id));
                headerCheckRef.current.indeterminate = some && !all;
            }, [songs, selectedIds]);

            const fetchSongs = async (page = currentPage) => {
                try {
                    const res = await axios.get('/api/songs', { params: { page, limit: 20, language: activeLang, search: searchTerm } });
                    setSongs(res.data.data || []);
                    setTotalPages(res.data.totalPages || 1);
                    setTotalSongs(res.data.total || 0);
                } catch { showToast('加载失败'); }
            };

            /* ── Selection ── */
            const toggleOne = (id) => setSelectedIds(prev => {
                const next = new Set(prev);
                next.has(id) ? next.delete(id) : next.add(id);
                return next;
            });
            const isAllSelected = songs.length > 0 && songs.every(s => selectedIds.has(s.id));
            const toggleAll = () => {
                setSelectedIds(prev => {
                    const next = new Set(prev);
                    isAllSelected ? songs.forEach(s => next.delete(s.id)) : songs.forEach(s => next.add(s.id));
                    return next;
                });
            };

            /* ── CRUD ── */
            const openAdd = () => {
                setFormData({ title: '', artist: '', language: '中文', status: 'normal' });
                setEditingId(null);
                setIsModalOpen(true);
            };
            const openEdit = (song) => {
                setFormData({ title: song.title, artist: song.artist, language: song.language, status: song.status });
                setEditingId(song.id);
                setIsModalOpen(true);
            };
            const closeModal = () => { setIsModalOpen(false); setEditingId(null); };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                try {
                    if (editingId) {
                        await axios.put(`/admin/api/songs/${editingId}`, formData);
                        showToast('修改成功');
                    } else {
                        await axios.post('/admin/api/songs', formData);
                        showToast('添加成功');
                    }
                    closeModal();
                    fetchSongs(currentPage);
                } catch { showToast(editingId ? '修改失败' : '添加失败'); }
                finally { setSubmitting(false); }
            };

            const handleDelete = async (id) => {
                if (!confirm('确定要删除这首歌吗？')) return;
                try {
                    await axios.delete(`/admin/api/songs/${id}`);
                    setSelectedIds(prev => { const n = new Set(prev); n.delete(id); return n; });
                    showToast('删除成功');
                    fetchSongs(currentPage);
                } catch { showToast('删除失败'); }
            };

            const handleBatchDelete = async () => {
                const count = selectedIds.size;
                if (!confirm(`确定要删除选中的 ${count} 首歌曲吗？此操作不可撤销。`)) return;
                try {
                    await axios.post('/admin/api/batch-delete', { ids: Array.from(selectedIds) });
                    showToast(`已删除 ${count} 首歌曲`);
                    setSelectedIds(new Set());
                    fetchSongs(currentPage);
                } catch { showToast('批量删除失败'); }
            };

            /* ── CSV Import ── */
            const handleCsvUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!confirm('确定要导入该 CSV 文件吗？这会追加到现有数据库中。')) { e.target.value = ''; return; }
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const text = ev.target.result;
                        const rows = text.split(/\r?\n/);
                        const csvSongs = [];
                        const parseLine = (line) => {
                            const res = []; let cur = '', inQ = false, i = 0;
                            while (i < line.length) {
                                const c = line[i];
                                if (c === '"') {
                                    if (inQ && line[i + 1] === '"') { cur += '"'; i += 2; continue; }
                                    inQ = !inQ;
                                } else if (c === ',' && !inQ) {
                                    res.push(cur.trim()); cur = '';
                                } else {
                                    cur += c;
                                }
                                i++;
                            }
                            res.push(cur.trim());
                            return res;
                        };
                        const firstLine = rows[0] ? rows[0].toLowerCase() : '';
                        const isStandard = firstLine.includes('title') || firstLine.includes('歌名');
                        if (isStandard) {
                            const VALID_LANGS   = ['中文','日语','英语','其他'];
                            const VALID_STATUS  = ['normal','need_sc','banned'];
                            for (let i = 1; i < rows.length; i++) {
                                const line = rows[i].trim(); if (!line) continue;
                                const [title, artist, language, status] = parseLine(line);
                                if (!title) continue;
                                csvSongs.push({ title, artist: artist || '', language: VALID_LANGS.includes(language) ? language : '中文', status: VALID_STATUS.includes(status) ? status : 'normal' });
                            }
                        } else {
                            let start = 0;
                            for (let i = 0; i < rows.length; i++) {
                                if (rows[i].includes('中文歌曲') && rows[i].includes('日语歌曲')) { start = i + 1; break; }
                            }
                            const add = (title, lang) => {
                                if (!title || title.startsWith('表格') || title.startsWith('注：') || title === '韩语歌曲' || title === '塔语歌曲') return;
                                const clean = title.replace(/^"|"$/g,'').trim();
                                if (clean) csvSongs.push({ title: clean, artist: '优花璃', language: lang, status: 'normal' });
                            };
                            for (let i = start; i < rows.length; i++) {
                                const line = rows[i].trim(); if (!line) continue;
                                const cols = parseLine(line);
                                if (cols[0]) add(cols[0], '中文');
                                if (cols[2]) add(cols[2], '日语');
                                if (cols[4]) add(cols[4], '英语');
                                if (cols[6]) add(cols[6], '其他');
                            }
                        }
                        if (csvSongs.length === 0) { showToast('未找到有效歌曲数据'); return; }
                        showToast(`解析出 ${csvSongs.length} 首，正在导入...`);
                        await axios.post('/admin/api/import', csvSongs);
                        showToast(`成功导入 ${csvSongs.length} 首新歌`);
                        fetchSongs(currentPage);
                    } catch (err) { showToast('导入失败: ' + err.message); }
                    finally { e.target.value = ''; }
                };
                reader.readAsText(file, 'UTF-8');
            };

            const handleLogout = async () => {
                try { await axios.post('/api/auth/logout'); } catch {}
                window.location.href = '/login.html';
            };

            /* ── Render ── */
            const isAllOnPage = songs.length > 0 && songs.every(s => selectedIds.has(s.id));

            return (
                <div className="page">
                    {toast && <div className="toast">{toast}</div>}

                    {/* Header */}
                    <div className="header">
                        <h1>歌曲管理后台</h1>
                        <button onClick={handleLogout} className="btn btn-sm btn-danger">退出登录</button>
                    </div>

                    {/* Main card */}
                    <div className="card">

                        {/* Toolbar */}
                        <div className="toolbar">
                            <div className="toolbar-left">
                                <span className="total-label">共 {totalSongs} 首</span>
                                <input
                                    className="search-input"
                                    placeholder="搜索歌曲 / 歌手..."
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                />
                                <div className="lang-filters">
                                    {LANG_OPTIONS.map(o => (
                                        <button key={o.value} className={`lang-pill ${activeLang === o.value ? 'active' : ''}`}
                                            onClick={() => { setActiveLang(o.value); setCurrentPage(1); }}>
                                            {o.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="toolbar-right">
                                <button onClick={openAdd} className="btn btn-sm btn-primary">+ 添加</button>
                                <div className="file-btn-wrap">
                                    <input type="file" accept=".csv" onChange={handleCsvUpload} />
                                    <button className="btn btn-sm btn-ghost">导入 CSV</button>
                                </div>
                            </div>
                        </div>

                        {/* Table header */}
                        <div className="table-header table-cols">
                            <input type="checkbox" ref={headerCheckRef} checked={isAllOnPage} onChange={toggleAll} />
                            <span>歌名</span>
                            <span>歌手</span>
                            <span>语言</span>
                            <span>状态</span>
                            <span>操作</span>
                        </div>

                        {/* Song rows */}
                        <div className="song-list">
                            {songs.length === 0 && (
                                <div style={{padding:'2.5rem', textAlign:'center', color:'#94a3b8', fontSize:'0.875rem'}}>
                                    暂无歌曲数据
                                </div>
                            )}
                            {songs.map(song => (
                                <div key={song.id} className={`song-row table-cols ${selectedIds.has(song.id) ? 'selected' : ''}`}>
                                    <input type="checkbox" checked={selectedIds.has(song.id)} onChange={() => toggleOne(song.id)} />
                                    <span className="song-title">{song.title}</span>
                                    <span className="song-artist">{song.artist}</span>
                                    <span className={`badge song-desktop-badge lang-${song.language}`}>
                                        {song.language}
                                    </span>
                                    <span className={`badge song-desktop-badge status-${song.status}`}>
                                        {STATUS_LABEL[song.status] || song.status}
                                    </span>
                                    {/* Mobile: badges + actions together */}
                                    <div className="song-mobile-meta">
                                        <span className={`badge lang-${song.language}`}>{song.language}</span>
                                        <span className={`badge status-${song.status}`}>{STATUS_LABEL[song.status] || song.status}</span>
                                    </div>
                                    <div className="row-actions">
                                        <button onClick={() => openEdit(song)} className="btn btn-xs btn-edit">编辑</button>
                                        <button onClick={() => handleDelete(song.id)} className="btn btn-xs btn-danger">删除</button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Pagination */}
                        <div className="pagination">
                            <button
                                onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                disabled={currentPage === 1}
                                className="btn btn-sm btn-ghost"
                                style={{ opacity: currentPage === 1 ? 0.45 : 1, cursor: currentPage === 1 ? 'not-allowed' : 'pointer' }}>
                                上一页
                            </button>
                            <span className="page-info">{currentPage} / {totalPages} 页</span>
                            <button
                                onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                                disabled={currentPage === totalPages}
                                className="btn btn-sm btn-ghost"
                                style={{ opacity: currentPage === totalPages ? 0.45 : 1, cursor: currentPage === totalPages ? 'not-allowed' : 'pointer' }}>
                                下一页
                            </button>
                        </div>
                    </div>

                    {/* Batch action bar */}
                    {selectedIds.size > 0 && (
                        <div className="batch-bar">
                            <span>已选 <span className="batch-count">{selectedIds.size}</span> 首</span>
                            <button onClick={() => setSelectedIds(new Set())} className="btn btn-xs btn-ghost">取消</button>
                            <button onClick={handleBatchDelete} className="btn btn-xs btn-danger">批量删除</button>
                        </div>
                    )}

                    {/* Add / Edit Modal */}
                    {isModalOpen && (
                        <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) closeModal(); }}>
                            <div className="modal-content">
                                <div className="modal-title">{editingId ? '编辑歌曲' : '添加新歌'}</div>
                                <form onSubmit={handleSubmit}>
                                    <div className="form-group">
                                        <label className="form-label">歌名</label>
                                        <input className="form-input" placeholder="请输入歌名" value={formData.title}
                                            onChange={e => setFormData({...formData, title: e.target.value})} required autoFocus />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">歌手</label>
                                        <input className="form-input" placeholder="请输入歌手" value={formData.artist}
                                            onChange={e => setFormData({...formData, artist: e.target.value})} required />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">语言</label>
                                        <CustomSelect value={formData.language} onChange={v => setFormData({...formData, language: v})} options={SONG_LANG_OPTIONS} />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">点歌状态</label>
                                        <CustomSelect value={formData.status} onChange={v => setFormData({...formData, status: v})} options={SONG_STATUS_OPTIONS} />
                                    </div>
                                    <div style={{display:'flex', gap:'0.75rem', marginTop:'1.25rem'}}>
                                        <button type="submit" className="btn btn-md btn-primary" style={{flex:1}} disabled={submitting}>
                                            {submitting ? '提交中...' : (editingId ? '保存修改' : '添加歌曲')}
                                        </button>
                                        <button type="button" onClick={closeModal} className="btn btn-md btn-ghost" style={{flex:1}}>
                                            取消
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        /* ── Auth guard ── */
        (async () => {
            try {
                const res = await fetch('/admin/api/songs?page=1&limit=1');
                if (res.status === 401) { window.location.replace('/login.html'); return; }
            } catch { window.location.replace('/login.html'); return; }
            ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);
        })();
    </script>
</body>
</html>
