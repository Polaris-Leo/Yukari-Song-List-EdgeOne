<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <link rel="icon" href="https://cdn.imgos.cn/vip/2026/03/23/69c11aa551328.png">
    <title>优花璃点歌台</title>
    <!-- 预连接 CDN 节点，减少 DNS 解析 + TCP 握手延迟 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdn.imgos.cn" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdn.imgos.cn">
    <!-- 预加载 LCP 背景图：fetchpriority=high 告知浏览器优先拉取 -->
    <link rel="preload" href="https://cdn.imgos.cn/vip/2026/03/23/69c0e63270098.png" as="image" fetchpriority="high">
    <!-- 预加载 React 核心库（渲染 LCP 内容必须） -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" as="script" crossorigin>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" as="script" crossorigin>
    <!-- React 同步加载（LCP 内容依赖） -->
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        // 屏蔽 Babel 浏览器端转换的生产环境警告
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('in-browser Babel transformer')) {
                return;
            }
            originalWarn.apply(console, args);
        };
    </script>
    <!-- Babel 和 axios 通过动态加载，不阻塞首屏渲染 -->
    <script>
        (function() {
            function loadScript(src, onload) {
                var s = document.createElement('script');
                s.src = src;
                if (onload) s.onload = onload;
                document.head.appendChild(s);
            }
            // axios 不影响 LCP，与 Babel 并行加载
            loadScript('https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js');
            loadScript('https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.5/babel.min.js', function() {
                // Babel 就绪后，手动编译并执行页面中所有 type="text/babel" 的脚本
                var scripts = document.querySelectorAll('script[type="text/babel"]');
                scripts.forEach(function(script) {
                    var code = Babel.transform(script.textContent, { presets: ['react'] }).code;
                    var s = document.createElement('script');
                    s.textContent = code;
                    document.body.appendChild(s);
                });
            });
        })();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; 
            /* 先用纯色占位，背景图加载后再显示，避免白/空白闪烁 */
            background-color: #f8fafc;
            background-image: url('https://cdn.imgos.cn/vip/2026/03/23/69c0e63270098.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            color: #1e293b; 
            line-height: 1.6; 
        }
        #root { min-height: 100vh; }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }
        
        .space-y-8 > * + * { margin-top: 1.5rem; }
        .animate-in { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .header-card {
            background: rgba(255, 255, 255, 0.85); /* 提高不透明度，减少 blur 需求 */
            border-radius: 1.5rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
            /* backdrop-filter 仅在非移动端启用，移动端 GPU 合成代价高 */
            backdrop-filter: blur(8px);
            will-change: transform;
            contain: layout style;
        }

        .header-card:hover {
            box-shadow: 0 12px 48px rgba(79, 70, 229, 0.15);
            border-color: rgba(79, 70, 229, 0.3);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 1rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .status-badge:hover {
            transform: scale(1.05);
        }
        
        .status-badge.active {
            background: rgba(34, 197, 94, 0.1);
            color: #15803d;
        }
        
        .status-badge.inactive {
            background: rgba(239, 68, 68, 0.1);
            color: #b91c1c;
        }
        
        .status-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
        }
        
        .status-dot.active {
            background: #22c55e;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-dot.inactive {
            background: #ef4444;
        }

        .filter-bar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: sticky;
            top: 1rem;
            z-index: 30;
            background: rgba(255, 255, 255, 0.92);
            padding: 1rem;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .search-box {
            position: relative;
            flex: 1;
        }
        
        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        
        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #cbd5e1;
            border-radius: 1rem;
            padding: 0.625rem 1rem 0.625rem 2.5rem;
            color: #1e293b;
            font-size: 1rem; /* >= 16px 防止 iOS Safari 自动缩放 */
            transition: all 0.2s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
            transform: translateY(-1px);
        }
        
        .lang-tabs {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.5rem; /* 增加内边距防止阴影被截断 */
            margin: 0 -0.5rem; /* 保持视觉对齐 */
            scrollbar-width: none; /* 隐藏滚动条 (Firefox) */
        }
        
        .lang-tabs::-webkit-scrollbar {
            display: none; /* 隐藏滚动条 (Chrome/Safari) */
        }
        
        .lang-tab {
            padding: 0.625rem 1.25rem; /* 增加内边距以匹配高度 */
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
            white-space: nowrap;
            border: 1px solid transparent; /* 预留边框位，防止切换跳动 */
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .lang-tab.active {
            background: #4f46e5;
            color: white;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
            border-color: #4f46e5; /* 确保active也有边框颜色 */
        }
        
        .lang-tab.inactive {
            background: rgba(255, 255, 255, 0.8);
            color: #64748b;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .lang-tab.inactive:hover {
            background: white;
            transform: translateY(-2px);
            color: #4f46e5;
        }
        
        .song-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 1rem;
        }
        
        @media (min-width: 640px) { .song-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 768px) { .song-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .song-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1280px) { .song-grid { grid-template-columns: repeat(5, 1fr); } }
        
        .song-card {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 1rem;
            padding: 1.25rem;
            min-width: 0; /* 防止 Grid 列被长文字撑宽 */
            /* 仅过渡必要属性，避免 transition: all 触发全量计算 */
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease, background-color 0.2s ease;
            animation: fadeIn 0.5s ease-out backwards;
            display: flex;
            flex-direction: column;
            /* 视口外卡片延迟渲染，减少首屏工作量 */
            content-visibility: auto;
            contain-intrinsic-size: 0 180px;
        }

        /* 歌曲名最多显示 2 行，超出省略 */
        .song-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: #1e293b;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            word-break: break-word;
            margin-bottom: 0.25rem;
            line-height: 1.4;
        }
        
        .song-card:hover {
            border-color: rgba(79, 70, 229, 0.6);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.95);
        }
        
        .song-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }
        
        .lang-badge {
            font-size: 0.75rem;
            color: #64748b;
            border: 1px solid #cbd5e1;
            padding: 0.25rem 0.625rem;
            border-radius: 0.5rem;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.5);
        }

        .lang-badge:hover {
            border-color: #4f46e5;
            color: #4f46e5;
            background: white;
        }
        
        .status-tag {
            font-size: 0.75rem;
            padding: 0.25rem 0.625rem;
            border-radius: 0.5rem;
            border: 1px solid;
            transition: all 0.2s ease;
        }

        .status-tag:hover {
            transform: scale(1.05);
        }
        
        .btn-copy {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1rem;
            border-radius: 0.75rem;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            font-size: 0.875rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: auto; /* Push button to the bottom */
        }
        
        .btn-copy:hover {
            background: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-copy:active {
            transform: translateY(0);
        }
        
        .btn-copy:disabled {
            background: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }
        
        .toast {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: #4f46e5;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.3s;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -1rem); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        
        .filter-row {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .filter-row { 
                flex-direction: row; 
                align-items: center; /* 确保垂直居中对齐 */
            }
            .header-layout {
                flex-direction: row;
                align-items: stretch;
                justify-content: space-between;
            }
            .header-info {
                flex: 1;
                padding-right: 2rem;
            }
            .random-widget {
                width: 260px;
                flex-shrink: 0;
            }
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.2s;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 400px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            animation: modalPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .btn-random {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            white-space: nowrap;
            font-size: 0.875rem;
        }

        .btn-random:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }
        
        .btn-random:active {
            transform: translateY(0);
        }

        .header-layout {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .random-widget {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 1rem;
            padding: 1rem;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .random-widget:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(245, 158, 11, 0.6);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.15);
            transform: translateY(-2px);
        }

        .random-widget::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, #f59e0b, #d97706);
        }

        .btn-mini-copy {
            margin-top: 0.5rem;
            background: #f59e0b;
            color: white;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            cursor: pointer;
            align-self: flex-start;
            transition: all 0.2s;
        }

        .top-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .random-widget-standalone {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
            cursor: pointer;
        }

        .random-widget-standalone:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: #f59e0b;
            box-shadow: 0 12px 48px rgba(245, 158, 11, 0.2);
            transform: translateY(-4px);
        }

        @media (min-width: 768px) {
            .filter-row { flex-direction: row; }
            .top-container {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                align-items: stretch;
            }
            .header-card {
                grid-column: span 2;
            }
            .random-widget-standalone {
                width: auto;
            }
        }

        @media (min-width: 1024px) {
            .top-container { grid-template-columns: repeat(4, 1fr); }
            .header-card { grid-column: span 3; }
        }

        @media (min-width: 1280px) {
            .top-container { grid-template-columns: repeat(5, 1fr); }
            .header-card { grid-column: span 4; }
        }

        /* ===== 移动端适配 ===== */
        .page-wrapper {
            width: 100%;
            padding: 1rem 1rem 2rem;
            box-sizing: border-box;
        }

        /* 加速点击响应，消除 iOS 300ms 延迟 */
        .btn-copy, .lang-tab, .btn-random, .random-widget-standalone {
            touch-action: manipulation;
        }

        @media (max-width: 639px) {
            .page-wrapper { padding: 0.5rem 0.75rem 1.5rem; }
            .header-card { padding: 1.25rem 1rem; }
            .random-widget-standalone { padding: 1rem; }
            .song-card { padding: 1rem; }
            /* 搜索框始终全宽 */
            .filter-row { flex-direction: column; }
        }

        /* 触摸设备上禁用 hover 位移，防止元素被点击后卡在悬浮状态 */
        @media (hover: none) {
            .song-card:hover { transform: none; box-shadow: none; }
            .btn-copy:hover { transform: none; box-shadow: none; }
            .btn-random:hover { transform: none; box-shadow: none; }
            .random-widget-standalone:hover { transform: none; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
            .lang-tab.inactive:hover { transform: none; }
            .header-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.1); border-color: rgba(255,255,255,0.5); }
            .lang-badge:hover { border-color: #cbd5e1; color: #64748b; background: rgba(255,255,255,0.5); }
        }
    </style>
</head>
<body>
    <!-- LCP 骨架屏：React 渲染前即可被浏览器测量，显著提前 LCP 时间点 -->
    <!-- React 挂载后会替换此内容，视觉上无闪烁 -->
    <div id="root">
        <div class="page-wrapper">
            <div class="space-y-8">
                <div class="top-container">
                    <div class="header-card">
                        <div style="position:relative;z-index:10">
                            <div style="margin-bottom:1.5rem">
                                <h1 style="font-size:1.875rem;font-weight:700;color:#1e293b;margin-bottom:0.5rem">欢迎来到优花璃的点歌台</h1>
                                <p style="color:#64748b;margin-bottom:0.5rem">当前状态: <span style="display:inline-flex;align-items:center;gap:0.375rem;padding:0.375rem 1rem;border-radius:9999px;font-size:0.75rem;font-weight:700;background:rgba(34,197,94,0.1);color:#15803d;margin-left:0.5rem"><span style="width:0.5rem;height:0.5rem;border-radius:50%;background:#22c55e;display:inline-block"></span>可点歌</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LANGUAGES = { '中文': '中文', '日语': '日语', '英语': '英语', '其他': '其他' };
        
        const STATUS_CONFIG = {
            normal: { label: '可点歌', color: 'rgba(34, 197, 94, 0.1)', textColor: '#15803d', borderColor: 'rgba(34, 197, 94, 0.5)', allowRequest: true },
            need_sc: { label: '需SC点歌', color: 'rgba(236, 72, 153, 0.1)', textColor: '#be185d', borderColor: 'rgba(236, 72, 153, 0.5)', allowRequest: true },
            banned: { label: '禁止点歌', color: 'rgba(239, 68, 68, 0.1)', textColor: '#b91c1c', borderColor: 'rgba(239, 68, 68, 0.5)', allowRequest: false }
        };

        function HomeApp() {
            const [songs, setSongs] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [activeLang, setActiveLang] = useState('ALL');
            const [isRequestOpen, setIsRequestOpen] = useState(true);
            const [toast, setToast] = useState(null);
            const [randomSong, setRandomSong] = useState(null);
            
            const [currentPage, setCurrentPage] = useState(1);
            const [totalPages, setTotalPages] = useState(1);
            const [isLoading, setIsLoading] = useState(false);

            // 用于跳过首次渲染时 searchTerm effect 的触发，避免与 currentPage/activeLang effect 重复发起请求
            const searchMounted = React.useRef(false);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            useEffect(() => {
                if (!searchMounted.current) {
                    searchMounted.current = true;
                    return;
                }
                const timer = setTimeout(() => {
                    setCurrentPage(1);
                    loadSongs(1);
                }, 400);
                return () => clearTimeout(timer);
            }, [searchTerm]);

            useEffect(() => {
                loadSongs(currentPage);
            }, [currentPage, activeLang]);

            useEffect(() => {
                pickRandomSong();
            }, []);

            const loadSongs = async (page = currentPage) => {
                setIsLoading(true);
                try {
                    const params = {
                        page: page,
                        limit: 15,
                        language: activeLang,
                        search: searchTerm
                    };
                    const res = await axios.get('/api/songs', { params });
                    setSongs(res.data.data || []);
                    setTotalPages(res.data.totalPages || 1);
                } catch (err) {
                    console.error('加载歌曲失败:', err);
                    showToast('加载歌曲失败');
                } finally {
                    setIsLoading(false);
                }
            };

            const pickRandomSong = async () => {
                try {
                    const res = await axios.get('/api/songs/random');
                    if (res.data) {
                        setRandomSong(res.data);
                    }
                } catch (err) {
                    console.error('获取随机歌曲失败:', err);
                }
            };

            const copyRequestCommand = async (songTitle) => {
                const command = `点歌 ${songTitle}`;
                try {
                    await navigator.clipboard.writeText(command);
                    showToast(`已复制：${command}`);
                } catch {
                    // 降级：部分旧浏览器回退到 execCommand
                    const ta = document.createElement('textarea');
                    ta.value = command;
                    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    showToast(`已复制：${command}`);
                }
            };

            return (
                <div className="page-wrapper">
                    {toast && <div className="toast">{toast}</div>}
                    
                    <div className="space-y-8 animate-in">
                        <div className="top-container">
                            {/* Header & Filters */}
                            <div className="header-card">
                                <div style={{ position: 'relative', zIndex: 10 }}>
                                    <div style={{ marginBottom: '1.5rem' }}>
                                        <h1 style={{ fontSize: '1.875rem', fontWeight: 700, color: '#1e293b', marginBottom: '0.5rem' }}>欢迎来到优花璃的点歌台</h1>
                                        <p style={{ color: '#64748b', marginBottom: '0.5rem', maxWidth: '42rem' }}>
                                            当前状态: 
                                            <span className={`status-badge ${isRequestOpen ? 'active' : 'inactive'}`} style={{ marginLeft: '0.5rem' }}>
                                                <span className={`status-dot ${isRequestOpen ? 'active' : 'inactive'}`}></span>
                                                {isRequestOpen ? '可点歌' : '暂未开始点歌'}
                                            </span>
                                        </p>
                                    </div>

                                    {/* Filter Row */}
                                    <div className="filter-row">
                                        <div className="search-box">
                                            <svg className="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                            <input 
                                                type="text" 
                                                placeholder="搜索歌曲 / 歌手..." 
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="search-input"
                                                style={{ background: 'rgba(255, 255, 255, 0.8)' }}
                                            />
                                        </div>
                                        <div className="lang-tabs">
                                            <button onClick={() => setActiveLang('ALL')} className={`lang-tab ${activeLang === 'ALL' ? 'active' : 'inactive'}`}>全部</button>
                                            {Object.entries(LANGUAGES).map(([key, label]) => (
                                                <button key={key} onClick={() => setActiveLang(key)} className={`lang-tab ${activeLang === key ? 'active' : 'inactive'}`}>{label}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Random Widget Standalone */}
                            <div className="random-widget-standalone" onClick={pickRandomSong} title="点击换一首">
                                {randomSong ? (
                                    <>
                                        <div className="song-header" style={{marginBottom: '1rem'}}>
                                            <span className="lang-badge" style={{borderColor: '#f59e0b', color: '#d97706', background: '#fffbeb'}}>✨ 随便听听</span>
                                            <span className="status-tag" style={{ background: 'rgba(245, 158, 11, 0.1)', color: '#b45309', borderColor: 'rgba(245, 158, 11, 0.5)' }}>
                                                点击刷新
                                            </span>
                                        </div>
                                        <h3 style={{ fontSize: '1.5rem', fontWeight: 700, color: '#1e293b', overflow: 'hidden', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', wordBreak: 'break-word', marginBottom: '0.5rem', lineHeight: 1.3 }}>{randomSong.title}</h3>
                                        <p style={{ fontSize: '1.1rem', color: '#64748b', marginBottom: '1.5rem', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{randomSong.artist}</p>
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); copyRequestCommand(randomSong.title); }}
                                            className="btn-copy"
                                            style={{
                                                background: 'linear-gradient(135deg, #f59e0b 0%, #d97706 100%)',
                                                fontSize: '1rem',
                                                padding: '0.875rem 1.5rem'
                                            }}
                                        >
                                            复制点歌弹幕
                                        </button>
                                    </>
                                ) : (
                                    <div style={{color: '#94a3b8', textAlign: 'center'}}>加载中...</div>
                                )}
                            </div>
                        </div>

                        {/* Song Grid */}
                        <div className="song-grid">
                            {songs.map((song, index) => {
                                const config = STATUS_CONFIG[song.status] || STATUS_CONFIG.normal;
                                return (
                                    <div key={song.id} className="song-card">
                                        <div className="song-header">
                                            <span className="lang-badge">{LANGUAGES[song.language] || song.language}</span>
                                            <span className="status-tag" style={{ background: config.color, color: config.textColor, borderColor: config.borderColor }}>
                                                {config.label}
                                            </span>
                                        </div>
                                        <h3 className="song-title">{song.title}</h3>
                                        <p style={{ fontSize: '0.875rem', color: '#64748b', marginBottom: '0.75rem', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{song.artist}</p>
                                        {config.allowRequest ? (
                                            <button onClick={() => copyRequestCommand(song.title)} className="btn-copy">
                                                复制点歌弹幕
                                            </button>
                                        ) : (
                                            <button disabled className="btn-copy">暂时不可点</button>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        {/* Pagination Controls */}
                        <div style={{ display: 'flex', justifyContent: 'center', gap: '1rem', paddingBottom: '1rem' }}>
                            <button  
                                onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                disabled={currentPage === 1 || isLoading}
                                className="btn-copy"
                                style={{ width: 'auto', background: currentPage === 1 ? '#cbd5e1' : undefined, cursor: currentPage === 1 ? 'not-allowed' : 'pointer' }}
                            >
                                上一页
                            </button>
                            <span style={{ display: 'flex', alignItems: 'center', fontWeight: 'bold', color: '#ffffff', textShadow: '0 2px 4px rgba(0,0,0,0.5)' }}>
                                {currentPage} / {totalPages}
                            </span>
                            <button 
                                onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                                disabled={currentPage === totalPages || isLoading}
                                className="btn-copy"
                                style={{ width: 'auto', background: currentPage === totalPages ? '#cbd5e1' : undefined, cursor: currentPage === totalPages ? 'not-allowed' : 'pointer' }}
                            >
                                下一页
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HomeApp />);
    </script>
</body>
</html>
