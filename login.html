<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <link rel="icon" href="https://cdn.imgos.cn/vip/2026/03/23/69c11aa551328.png">
    <title>优花璃点歌台 - 管理员登录</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdn.imgos.cn" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdn.imgos.cn">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" as="script" crossorigin>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" as="script" crossorigin>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.5/babel.min.js" as="script">
    <link rel="preload" href="https://cdn.imgos.cn/vip/2026/03/23/69c0e63270098.png" as="image">
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        // 屏蔽 Babel 浏览器端转换的生产环境警告
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('in-browser Babel transformer')) {
                return;
            }
            originalWarn.apply(console, args);
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; 
            background: #f8fafc url('https://cdn.imgos.cn/vip/2026/03/23/69c0e63270098.png') no-repeat center center fixed; 
            background-size: cover;
            color: #1e293b; 
            line-height: 1.6; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* iOS Safari 地址栏高度修正 */
            padding: 1rem; /* 防止卡片贴边 */
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 1rem;
            padding: 3rem;
            width: 500px;
            max-width: 90vw;
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            margin-bottom: 2rem; 
            color: #1e293b; 
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .form-group { margin-bottom: 1.5rem; }
        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            color: #475569; 
            font-size: 0.875rem;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            color: #1e293b;
            transition: all 0.2s;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            background: #4f46e5; 
            color: white;
            font-size: 1rem;
            margin-top: 0.5rem;
            touch-action: manipulation;
        }
        
        .btn:hover { background: #4338ca; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }

        @media (max-width: 639px) {
            .login-card { padding: 1.75rem 1.5rem; }
        }

        @media (hover: none) {
            .btn:hover { transform: none; }
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 1rem;
            min-height: 1.25rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function LoginApp() {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                try {
                    const res = await axios.post('/api/auth/login', { username, password });
                    if (res.data.success) {
                        window.location.href = '/admin.html';
                    }
                } catch (err) {
                    setError(err.response?.data?.error || '登录失败，请检查用户名和密码');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="login-card">
                    <h1>管理员登录</h1>
                    <form onSubmit={handleLogin}>
                        <div className="error-msg">{error}</div>
                        <div className="form-group">
                            <label>用户名</label>
                            <input 
                                type="text" 
                                value={username}
                                onChange={(e) => setUsername(e.target.value)}
                                placeholder="请输入用户名"
                                required
                                autoFocus
                            />
                        </div>
                        <div className="form-group">
                            <label>密码</label>
                            <input 
                                type="password" 
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                placeholder="请输入密码"
                                required
                            />
                        </div>
                        <button type="submit" className="btn" disabled={loading}>
                            {loading ? '登录中...' : '登录'}
                        </button>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LoginApp />);
    </script>
</body>
</html>
